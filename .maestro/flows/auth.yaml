appId: com.capysmoney.app
---
# Flow: Auth - Login Test

- clearState
- launchApp

# Wait for login screen
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000

- assertVisible:
    id: "login-screen"

# Enter credentials
- tapOn:
    id: "email-input"
- inputText: "test@capysmoney.com"

- tapOn:
    id: "password-input"
- inputText: "TestCapy2024!"

- hideKeyboard

- tapOn:
    id: "login-button"

# Wait for dashboard to load
- extendedWaitUntil:
    visible:
      id: "tab-home"
    timeout: 30000

- assertVisible:
    id: "tab-home"